# Archon — Prometheus / kube-prometheus-stack Helm values
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install archon-monitoring prometheus-community/kube-prometheus-stack \
#     -n archon-monitoring --create-namespace -f prometheus-values.yaml

# ──────────────────────────────────────────────
# Prometheus
# ──────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Discover ServiceMonitors/PodMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}

    retention: 15d
    retentionSize: "45GB"

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
          # Uncomment and set for cloud-specific storage classes:
          # storageClassName: gp3        # AWS
          # storageClassName: managed-csi # Azure
          # storageClassName: standard    # GCP

    # Scrape Archon backend /metrics endpoint
    additionalScrapeConfigs:
      - job_name: archon-backend
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [archon]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: keep
            regex: backend
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: "$1"

# ──────────────────────────────────────────────
# Alertmanager
# ──────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

  # Default alert routing — override with your receivers
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["namespace", "alertname", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "null"
      routes:
        - match:
            severity: critical
          receiver: "null"
          # Replace with your PagerDuty/Slack receiver:
          # receiver: pagerduty-critical
    receivers:
      - name: "null"
      # Example Slack receiver:
      # - name: slack-warning
      #   slack_configs:
      #     - api_url: https://hooks.slack.com/services/XXX
      #       channel: "#archon-alerts"
      #       send_resolved: true

# ──────────────────────────────────────────────
# Grafana
# ──────────────────────────────────────────────
grafana:
  enabled: true
  replicas: 1

  adminUser: admin
  # Set via --set grafana.adminPassword=<secret> or existingSecret
  adminPassword: ""
  existingSecret: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    size: 10Gi

  # Sidecar auto-loads dashboards from ConfigMaps with the label grafana_dashboard
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
    datasources:
      enabled: true
      label: grafana_datasource

  # Pre-install community dashboards via id
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      # Kubernetes cluster overview
      k8s-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      # Node exporter full
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      # Archon custom dashboard — loaded from ConfigMap (see below)

  ingress:
    enabled: false
    # Enable and configure for external access:
    # annotations:
    #   kubernetes.io/ingress.class: nginx
    #   cert-manager.io/cluster-issuer: letsencrypt-prod
    # hosts:
    #   - grafana.archon.example.com
    # tls:
    #   - secretName: grafana-tls
    #     hosts:
    #       - grafana.archon.example.com

# ──────────────────────────────────────────────
# Archon-specific PrometheusRules (alerts)
# ──────────────────────────────────────────────
additionalPrometheusRulesMap:
  archon-alerts:
    groups:
      - name: archon.backend
        rules:
          - alert: ArchonBackendDown
            expr: up{job="archon-backend"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Archon backend is down"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been down for 2+ minutes."

          - alert: ArchonHighErrorRate
            expr: |
              sum(rate(http_requests_total{job="archon-backend", status=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{job="archon-backend"}[5m]))
              > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Archon backend error rate > 5%"
              description: "Backend 5xx rate has exceeded 5% for the last 5 minutes."

          - alert: ArchonHighLatency
            expr: |
              histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="archon-backend"}[5m])) by (le))
              > 0.2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Archon p95 latency > 200ms"
              description: "Backend p95 latency has exceeded the 200ms SLO for 5 minutes."

          - alert: ArchonPodRestarting
            expr: increase(kube_pod_container_status_restarts_total{namespace="archon"}[1h]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Archon pod restarting frequently"
              description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last hour."

      - name: archon.resources
        rules:
          - alert: ArchonHighMemoryUsage
            expr: |
              container_memory_working_set_bytes{namespace="archon"}
              /
              container_spec_memory_limit_bytes{namespace="archon"}
              > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Archon container memory > 85% of limit"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of its memory limit."

          - alert: ArchonHighCPUUsage
            expr: |
              rate(container_cpu_usage_seconds_total{namespace="archon"}[5m])
              /
              container_spec_cpu_quota{namespace="archon"} * 100000
              > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Archon container CPU > 85% of limit"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} sustained high CPU usage."

          - alert: ArchonPVCAlmostFull
            expr: |
              kubelet_volume_stats_used_bytes{namespace=~"archon.*"}
              /
              kubelet_volume_stats_capacity_bytes{namespace=~"archon.*"}
              > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Archon PVC usage > 85%"
              description: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full."

# ──────────────────────────────────────────────
# kube-state-metrics and node-exporter (defaults)
# ──────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

# ──────────────────────────────────────────────
# Kubernetes component scrapers
# ──────────────────────────────────────────────
kubeApiServer:
  enabled: true
kubeControllerManager:
  enabled: true
kubeScheduler:
  enabled: true
kubeProxy:
  enabled: true
kubeEtcd:
  enabled: true
