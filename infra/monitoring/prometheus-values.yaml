# Archon — Prometheus / kube-prometheus-stack Helm values
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install archon-monitoring prometheus-community/kube-prometheus-stack \
#     -n archon-monitoring --create-namespace -f prometheus-values.yaml

# ──────────────────────────────────────────────
# Prometheus
# ──────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Discover ServiceMonitors/PodMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}

    retention: 15d
    retentionSize: "45GB"

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
          # Uncomment and set for cloud-specific storage classes:
          # storageClassName: gp3        # AWS
          # storageClassName: managed-csi # Azure
          # storageClassName: standard    # GCP

    # Scrape Archon backend /metrics endpoint
    additionalScrapeConfigs:
      - job_name: archon-backend
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [archon]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: keep
            regex: backend
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: "$1"

# ──────────────────────────────────────────────
# Alertmanager
# ──────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

  # Default alert routing — override with your receivers
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["namespace", "alertname", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "null"
      routes:
        - match:
            severity: critical
          receiver: "null"
          # Replace with your PagerDuty/Slack receiver:
          # receiver: pagerduty-critical
    receivers:
      - name: "null"
      # Example Slack receiver:
      # - name: slack-warning
      #   slack_configs:
      #     - api_url: https://hooks.slack.com/services/XXX
      #       channel: "#archon-alerts"
      #       send_resolved: true

# ──────────────────────────────────────────────
# Grafana
# ──────────────────────────────────────────────
grafana:
  enabled: true
  replicas: 1

  adminUser: admin
  # Set via --set grafana.adminPassword=<secret> or existingSecret
  adminPassword: ""
  existingSecret: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    size: 10Gi

  # Sidecar auto-loads dashboards from ConfigMaps with the label grafana_dashboard
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
    datasources:
      enabled: true
      label: grafana_datasource

  # Pre-install community dashboards via id
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      # Kubernetes cluster overview
      k8s-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      # Node exporter full
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      # Archon custom dashboard — loaded from ConfigMap (see below)

  ingress:
    enabled: false
    # Enable and configure for external access:
    # annotations:
    #   kubernetes.io/ingress.class: nginx
    #   cert-manager.io/cluster-issuer: letsencrypt-prod
    # hosts:
    #   - grafana.archon.example.com
    # tls:
    #   - secretName: grafana-tls
    #     hosts:
    #       - grafana.archon.example.com

# ──────────────────────────────────────────────
# Archon-specific PrometheusRules (alerts)
#
# `archon-alerts`: HTTP/infra-level rules (already in prod).
# `archon-orchestration`: orchestration/cost/provider rules — kept in sync with
# infra/monitoring/alerts/archon-orchestration.yaml. The standalone YAML is the
# source of truth used by scripts/check-grafana-metric-parity.py; this map is
# rendered into PrometheusRule CRDs by kube-prometheus-stack.
# ──────────────────────────────────────────────
additionalPrometheusRulesMap:
  archon-alerts:
    groups:
      - name: archon.backend
        rules:
          - alert: ArchonBackendDown
            expr: up{job="archon-backend"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Archon backend is down"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been down for 2+ minutes."

          - alert: ArchonHighErrorRate
            expr: |
              sum(rate(archon_requests_total{job="archon-backend", status=~"5.."}[5m]))
              /
              sum(rate(archon_requests_total{job="archon-backend"}[5m]))
              > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Archon backend error rate > 5%"
              description: "Backend 5xx rate has exceeded 5% for the last 5 minutes."

          - alert: ArchonHighLatency
            expr: |
              histogram_quantile(0.95, sum(rate(archon_request_duration_seconds_bucket{job="archon-backend"}[5m])) by (le))
              > 0.2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Archon p95 latency > 200ms"
              description: "Backend p95 latency has exceeded the 200ms SLO for 5 minutes."

          - alert: ArchonPodRestarting
            expr: increase(kube_pod_container_status_restarts_total{namespace="archon"}[1h]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Archon pod restarting frequently"
              description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last hour."

      - name: archon.resources
        rules:
          - alert: ArchonHighMemoryUsage
            expr: |
              container_memory_working_set_bytes{namespace="archon"}
              /
              container_spec_memory_limit_bytes{namespace="archon"}
              > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Archon container memory > 85% of limit"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of its memory limit."

          - alert: ArchonHighCPUUsage
            expr: |
              rate(container_cpu_usage_seconds_total{namespace="archon"}[5m])
              /
              container_spec_cpu_quota{namespace="archon"} * 100000
              > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Archon container CPU > 85% of limit"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} sustained high CPU usage."

          - alert: ArchonPVCAlmostFull
            expr: |
              kubelet_volume_stats_used_bytes{namespace=~"archon.*"}
              /
              kubelet_volume_stats_capacity_bytes{namespace=~"archon.*"}
              > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Archon PVC usage > 85%"
              description: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full."

  # ────────────────────────────────────────────
  # Orchestration / cost / provider rules.
  # Mirror of infra/monitoring/alerts/archon-orchestration.yaml — when you
  # change one file, change the other. scripts/check-grafana-metric-parity.py
  # parses the standalone YAML; this map is what kube-prometheus-stack renders.
  # ────────────────────────────────────────────
  archon-orchestration:
    groups:
      - name: archon.orchestration
        rules:
          - alert: ArchonHighRunFailureRate
            expr: |
              (
                sum by (tenant_id) (rate(archon_workflow_runs_total{status="failed"}[5m]))
                /
                clamp_min(sum by (tenant_id) (rate(archon_workflow_runs_total[5m])), 1e-9)
              ) > 0.1
            for: 10m
            labels:
              severity: warning
              component: orchestration
            annotations:
              summary: "Tenant {{ $labels.tenant_id }} run failure rate > 10%"
              description: "Workflow run failure rate for tenant {{ $labels.tenant_id }} has exceeded 10% for 10m."
              runbook_url: "https://archon.example.com/docs/runbooks/observability.md#archonhighrunfailurerate"

          - alert: ArchonCheckpointFailures
            expr: rate(archon_checkpoint_failures_total[5m]) > 0
            for: 1m
            labels:
              severity: critical
              component: durability
            annotations:
              summary: "Postgres checkpointer failed — durability at risk"
              description: "archon_checkpoint_failures_total has been incrementing for >1m. Workflow state may not be persisted."
              runbook_url: "https://archon.example.com/docs/runbooks/observability.md#archoncheckpointfailures"

          - alert: ArchonProviderUnhealthy
            expr: |
              (
                sum by (provider) (rate(archon_provider_latency_seconds_count{status="error"}[5m]))
                /
                clamp_min(sum by (provider) (rate(archon_provider_latency_seconds_count[5m])), 1e-9)
              ) > 0.5
            for: 5m
            labels:
              severity: warning
              component: providers
            annotations:
              summary: "Provider {{ $labels.provider }} error rate > 50%"
              description: "More than half of calls to provider {{ $labels.provider }} are failing."
              runbook_url: "https://archon.example.com/docs/runbooks/observability.md#archonproviderunhealthy"

          - alert: ArchonHighFallbackRate
            expr: sum(rate(archon_provider_fallback_total[5m])) > 1
            for: 10m
            labels:
              severity: warning
              component: providers
            annotations:
              summary: "Provider fallbacks > 1/s for 10m"
              description: "Sustained provider fallback activity — primary provider may be degraded."
              runbook_url: "https://archon.example.com/docs/runbooks/observability.md#archonhighfallbackrate"

          - alert: ArchonRunCancellationsSpike
            expr: sum by (reason) (rate(archon_run_cancellations_total[5m])) > 0.1
            for: 5m
            labels:
              severity: warning
              component: orchestration
            annotations:
              summary: "Run cancellations spiking ({{ $labels.reason }})"
              description: "Cancellation rate for reason={{ $labels.reason }} > 0.1/s for 5m."
              runbook_url: "https://archon.example.com/docs/runbooks/observability.md#archonruncancellationsspike"

          - alert: ArchonCostBudgetExceeded
            expr: rate(archon_cost_gate_blocks_total{reason="budget_exceeded"}[5m]) > 0
            for: 5m
            labels:
              severity: warning
              component: cost
            annotations:
              summary: "Tenant {{ $labels.tenant_id }} hit cost-gate budget"
              description: "Cost-gate is blocking new runs for tenant {{ $labels.tenant_id }} (budget_exceeded)."
              runbook_url: "https://archon.example.com/docs/runbooks/observability.md#archoncostbudgetexceeded"

          - alert: ArchonStuckRunningRuns
            expr: |
              (
                avg_over_time(archon_workflow_runs_in_progress[1h])
                and
                delta(archon_workflow_runs_total[1h]) == 0
              ) > 0
            for: 1h
            labels:
              severity: warning
              component: orchestration
            annotations:
              summary: "Workflow runs stuck in running for >1h with no progress"
              description: "Non-zero in-progress runs but no terminal transitions in the last hour."
              runbook_url: "https://archon.example.com/docs/runbooks/observability.md#archonstuckrunningruns"

          - alert: ArchonTenantContextMissing
            expr: rate(archon_tenant_context_missing_total[5m]) > 0
            for: 5m
            labels:
              severity: critical
              component: security
            annotations:
              summary: "Tenant context missing on protected handlers"
              description: "Requests reaching protected handlers without tenant context — multi-tenancy isolation risk."
              runbook_url: "https://archon.example.com/docs/runbooks/observability.md#archontenantcontextmissing"

          - alert: ArchonStepRetryStorm
            expr: sum by (node_type) (rate(archon_step_retries_total[5m])) > 1
            for: 10m
            labels:
              severity: warning
              component: orchestration
            annotations:
              summary: "Step retry storm on node_type={{ $labels.node_type }}"
              description: "Sustained step retries on node_type {{ $labels.node_type }}."
              runbook_url: "https://archon.example.com/docs/runbooks/observability.md#archonstepretrystorm"

          - alert: ArchonNoActiveWorkers
            expr: count(time() - archon_worker_heartbeat_seconds < 60) == 0
            for: 2m
            labels:
              severity: critical
              component: orchestration
            annotations:
              summary: "No worker heartbeats in last 60s"
              description: "Zero workers have heartbeated in the last minute — runs cannot progress."
              runbook_url: "https://archon.example.com/docs/runbooks/observability.md#archonnoactiveworkers"

# ──────────────────────────────────────────────
# kube-state-metrics and node-exporter (defaults)
# ──────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

# ──────────────────────────────────────────────
# Kubernetes component scrapers
# ──────────────────────────────────────────────
kubeApiServer:
  enabled: true
kubeControllerManager:
  enabled: true
kubeScheduler:
  enabled: true
kubeProxy:
  enabled: true
kubeEtcd:
  enabled: true
