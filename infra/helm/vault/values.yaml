# =============================================================================
# Archon — Vault Helm Values Override
# =============================================================================
# These values override the upstream hashicorp/vault chart defaults.
# Namespace pattern: archon/{tenant_id}/<engine>
# =============================================================================

# ---------------------------------------------------------------------------
# Vault Server
# ---------------------------------------------------------------------------
server:
  # -- High Availability with integrated Raft storage
  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable    = 0
          address        = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file  = "/vault/tls/tls.crt"
          tls_key_file   = "/vault/tls/tls.key"
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr = "https://archon-vault-0.archon-vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
          }
          retry_join {
            leader_api_addr = "https://archon-vault-1.archon-vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
          }
          retry_join {
            leader_api_addr = "https://archon-vault-2.archon-vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
          }
        }

        service_registration "kubernetes" {}

  # -- Persistent audit log storage
  auditStorage:
    enabled: true
    size: 10Gi
    storageClass: null  # Uses cluster default
    accessMode: ReadWriteOnce

  # -- Resource limits and requests
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m

  # -- Extra environment variables passed to Vault pods
  extraEnvironmentVars:
    VAULT_LOG_LEVEL: info

  # -- TLS via cert-manager
  # Certificates are provisioned by cert-manager and mounted into the pod.
  # Create a Certificate resource referencing the issuer below.
  volumes:
    - name: tls
      secret:
        secretName: vault-server-tls

  volumeMounts:
    - name: tls
      mountPath: /vault/tls
      readOnly: true

  # -- Data storage (Raft)
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: null
    accessMode: ReadWriteOnce

# ---------------------------------------------------------------------------
# Vault Agent Injector (sidecar injection)
# ---------------------------------------------------------------------------
injector:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

# ---------------------------------------------------------------------------
# Vault UI
# ---------------------------------------------------------------------------
ui:
  enabled: true
  serviceType: ClusterIP

# ---------------------------------------------------------------------------
# CSI Volume Driver
# ---------------------------------------------------------------------------
csi:
  enabled: true
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

# ---------------------------------------------------------------------------
# TLS — cert-manager integration
# ---------------------------------------------------------------------------
# Apply this Certificate resource separately or via an overlay:
#
#   apiVersion: cert-manager.io/v1
#   kind: Certificate
#   metadata:
#     name: vault-server-tls
#     namespace: vault
#   spec:
#     secretName: vault-server-tls
#     issuerRef:
#       name: archon-ca-issuer
#       kind: ClusterIssuer
#     commonName: vault.vault.svc.cluster.local
#     dnsNames:
#       - vault.vault.svc.cluster.local
#       - vault.vault.svc
#       - "*.archon-vault-internal"
#       - "*.archon-vault-internal.vault.svc.cluster.local"
#     ipAddresses:
#       - "127.0.0.1"
#     duration: 8760h   # 1 year
#     renewBefore: 720h  # 30 days

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
global:
  enabled: true
  tlsDisable: false
