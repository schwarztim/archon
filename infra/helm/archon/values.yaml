# -- Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []

# -- Backend (FastAPI) service
backend:
  replicaCount: 2
  image:
    repository: archon/backend
    tag: ""  # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  startupProbe:
    httpGet:
      path: /health
      port: http
    failureThreshold: 30
    periodSeconds: 5
  env: {}
  # Extra environment variables from secrets/configmaps
  envFrom: []

# -- Frontend (React) service
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: archon/frontend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: archon.local
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls: []
  #  - secretName: archon-tls
  #    hosts:
  #      - archon.local

# -- ConfigMap values
config:
  logLevel: INFO
  debug: "false"
  corsOrigins: "*"

# -- External dependencies (when not using sub-charts)
postgresql:
  host: ""
  port: 5432
  database: archon
  username: archon
  existingSecret: ""
  existingSecretPasswordKey: password

redis:
  host: ""
  port: 6379
  existingSecret: ""
  existingSecretPasswordKey: password

# -- Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- Pod-level settings
nodeSelector: {}
tolerations: []
affinity: {}

# -- Network policy
networkPolicy:
  enabled: false
