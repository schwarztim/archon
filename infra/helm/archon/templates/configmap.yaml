apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "archon.fullname" . }}
  labels:
    {{- include "archon.labels" . | nindent 4 }}
data:
  ARCHON_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  ARCHON_DEBUG: {{ .Values.config.debug | quote }}
  ARCHON_CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  {{- if .Values.postgresql.host }}
  ARCHON_DATABASE_URL: {{ include "archon.databaseUrl" . | quote }}
  {{- end }}
  {{- if .Values.redis.host }}
  ARCHON_REDIS_URL: {{ include "archon.redisUrl" . | quote }}
  {{- end }}
