# Archon API Contract (Stub)
#
# This file will be expanded into the full OpenAPI 3.1 spec during Phase 0.
# It serves as the locked, immutable API definition that all agents implement against.
# NO agent may deviate from this contract without Orchestrator approval.

openapi: "3.1.0"
info:
  title: Archon API
  version: "1.0.0"
  description: Enterprise AI Orchestration & Governance Platform
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: /api/v1
    description: Primary API

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /agents:
    get:
      operationId: listAgents
      summary: List all agents
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
    post:
      operationId: createAgent
      summary: Create a new agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCreate"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"

  /execute:
    post:
      operationId: executeAgent
      summary: Execute an agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionRequest"
      responses:
        "202":
          description: Execution started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionResponse"

components:
  parameters:
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
    OffsetParam:
      name: offset
      in: query
      schema:
        type: integer
        default: 0

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        timestamp:
          type: string
          format: date-time

    ResponseMeta:
      type: object
      properties:
        request_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        has_more:
          type: boolean

    # Stub schemas - to be fully defined in Phase 0
    AgentCreate:
      type: object
      required: [name, definition]
      properties:
        name:
          type: string
        description:
          type: string
        definition:
          type: object

    AgentResponse:
      type: object
      properties:
        data:
          type: object
        meta:
          $ref: "#/components/schemas/ResponseMeta"

    AgentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        meta:
          $ref: "#/components/schemas/ResponseMeta"

    ExecutionRequest:
      type: object
      required: [agent_id]
      properties:
        agent_id:
          type: string
          format: uuid
        input:
          type: object

    ExecutionResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            execution_id:
              type: string
              format: uuid
            status:
              type: string
              enum: [queued, running, completed, failed]
        meta:
          $ref: "#/components/schemas/ResponseMeta"
