# Archon API Contract — Full OpenAPI 3.1 Specification
#
# Expanded from openapi-stub.yaml during Phase 0.
# This is the locked, immutable API definition that all agents implement against.
# NO agent may deviate from this contract without Orchestrator approval.

openapi: "3.1.0"
info:
  title: Archon API
  version: "1.0.0"
  description: Enterprise AI Orchestration & Governance Platform
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: /api/v1
    description: Primary API

security:
  - BearerAuth: []

paths:
  # ────────────────────────────────────────────
  # Health
  # ────────────────────────────────────────────
  /health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      security: []
      tags:
        - health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ────────────────────────────────────────────
  # Agents — collection
  # ────────────────────────────────────────────
  /agents:
    get:
      operationId: listAgents
      summary: List all agents
      tags:
        - agents
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      operationId: createAgent
      summary: Create a new agent
      tags:
        - agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCreate"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # Agents — single resource
  # ────────────────────────────────────────────
  /agents/{agent_id}:
    parameters:
      - $ref: "#/components/parameters/AgentIdParam"
    get:
      operationId: getAgent
      summary: Get a single agent by ID
      tags:
        - agents
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      operationId: updateAgent
      summary: Update an existing agent
      tags:
        - agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdate"
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deleteAgent
      summary: Delete an agent
      tags:
        - agents
      responses:
        "204":
          description: Agent deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # Executions — trigger
  # ────────────────────────────────────────────
  /execute:
    post:
      operationId: executeAgent
      summary: Execute an agent
      tags:
        - executions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionRequest"
      responses:
        "202":
          description: Execution started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # Executions — list & detail
  # ────────────────────────────────────────────
  /executions:
    get:
      operationId: listExecutions
      summary: List executions with pagination
      tags:
        - executions
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
        - name: agent_id
          in: query
          description: Filter executions by agent ID
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter executions by status
          schema:
            type: string
            enum: [queued, running, completed, failed, cancelled]
      responses:
        "200":
          description: List of executions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /executions/{execution_id}:
    parameters:
      - $ref: "#/components/parameters/ExecutionIdParam"
    get:
      operationId: getExecution
      summary: Get a single execution by ID
      tags:
        - executions
      responses:
        "200":
          description: Execution details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # Users
  # ────────────────────────────────────────────
  /users:
    post:
      operationId: createUser
      summary: Register a new user
      tags:
        - users
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/me:
    get:
      operationId: getCurrentUser
      summary: Get the currently authenticated user
      tags:
        - users
      responses:
        "200":
          description: Current user details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # Templates — collection
  # ────────────────────────────────────────────
  /templates:
    get:
      operationId: listTemplates
      summary: List available agent templates
      tags:
        - templates
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      operationId: createTemplate
      summary: Create a new agent template
      tags:
        - templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateCreate"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # Templates — single resource
  # ────────────────────────────────────────────
  /templates/{template_id}:
    parameters:
      - $ref: "#/components/parameters/TemplateIdParam"
    get:
      operationId: getTemplate
      summary: Get a single template by ID
      tags:
        - templates
      responses:
        "200":
          description: Template details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # WebSocket — execution streaming
  # ────────────────────────────────────────────
  /ws/executions/{execution_id}:
    parameters:
      - $ref: "#/components/parameters/ExecutionIdParam"
    get:
      operationId: streamExecution
      summary: WebSocket endpoint for real-time execution streaming
      description: |
        Upgrades to a WebSocket connection that streams execution events in real time.
        Send `{"type": "subscribe"}` after connecting. The server pushes events:
        - `status_changed` — execution status transitions
        - `node_started` / `node_completed` — individual graph node progress
        - `log` — structured log entries
        - `output` — final or intermediate outputs
        - `error` — error details
        Connection closes automatically when the execution reaches a terminal state
        (completed, failed, cancelled).
      tags:
        - executions
      responses:
        "101":
          description: Switching protocols — WebSocket upgrade
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ────────────────────────────────────────────
  # SAML SSO
  # ────────────────────────────────────────────
  /auth/saml/metadata:
    get:
      operationId: getSamlMetadata
      summary: SAML SP metadata (XML)
      description: Returns the SAML Service Provider metadata document for IdP configuration.
      tags:
        - SAML
      security: []
      responses:
        "200":
          description: SAML SP metadata XML
          content:
            application/xml:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/saml/login:
    get:
      operationId: initiateSamlLogin
      summary: Initiate SAML login flow
      description: Redirects the user to the configured IdP for SAML authentication.
      tags:
        - SAML
      security:
        - BearerAuth: []
      parameters:
        - name: relay_state
          in: query
          description: URL to redirect to after successful authentication
          schema:
            type: string
            format: uri
      responses:
        "302":
          description: Redirect to IdP
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/saml/acs:
    post:
      operationId: samlAssertionConsumer
      summary: SAML Assertion Consumer Service (ACS)
      description: |
        Receives the SAML assertion from the IdP after successful authentication.
        Validates the assertion, creates or updates the user session, and redirects
        to the relay state URL.
      tags:
        - SAML
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/SamlAcsRequest"
      responses:
        "200":
          description: SAML assertion processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SamlAcsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/saml/slo:
    post:
      operationId: samlSingleLogout
      summary: SAML Single Logout (SLO)
      description: Processes SAML SLO requests or responses to terminate the session.
      tags:
        - SAML
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/SamlSloRequest"
      responses:
        "200":
          description: Logout processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SamlSloResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # SCIM 2.0 Provisioning
  # ────────────────────────────────────────────
  /scim/v2/ServiceProviderConfig:
    get:
      operationId: getScimServiceProviderConfig
      summary: SCIM Service Provider configuration
      description: Returns the SCIM 2.0 Service Provider configuration per RFC 7643.
      tags:
        - SCIM
      security: []
      responses:
        "200":
          description: SCIM Service Provider configuration
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimServiceProviderConfig"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /scim/v2/Users:
    get:
      operationId: listScimUsers
      summary: List SCIM users
      description: Lists users with SCIM 2.0 filtering and pagination per RFC 7644.
      tags:
        - SCIM
      security:
        - BearerAuth: []
      parameters:
        - name: filter
          in: query
          description: "SCIM filter expression (e.g. userName eq \"john@example.com\")"
          schema:
            type: string
        - name: startIndex
          in: query
          description: 1-based index of the first result
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: count
          in: query
          description: Maximum number of results to return
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: SCIM user list
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      operationId: createScimUser
      summary: Provision a SCIM user
      description: Creates a new user via SCIM 2.0 provisioning.
      tags:
        - SCIM
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimUserCreate"
      responses:
        "201":
          description: SCIM user created
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /scim/v2/Users/{scim_user_id}:
    parameters:
      - $ref: "#/components/parameters/ScimUserIdParam"
    get:
      operationId: getScimUser
      summary: Get a SCIM user
      description: Retrieves a single SCIM user by ID.
      tags:
        - SCIM
      security:
        - BearerAuth: []
      responses:
        "200":
          description: SCIM user details
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      operationId: replaceScimUser
      summary: Replace a SCIM user
      description: Full replacement of a SCIM user resource.
      tags:
        - SCIM
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimUserCreate"
      responses:
        "200":
          description: SCIM user replaced
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      operationId: patchScimUser
      summary: Patch a SCIM user
      description: Partial update of a SCIM user via SCIM PATCH operations (RFC 7644 §3.5.2).
      tags:
        - SCIM
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimPatchRequest"
      responses:
        "200":
          description: SCIM user patched
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deleteScimUser
      summary: Deprovision a SCIM user
      description: Deletes (deprovisions) a SCIM user.
      tags:
        - SCIM
      security:
        - BearerAuth: []
      responses:
        "204":
          description: SCIM user deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /scim/v2/Groups:
    get:
      operationId: listScimGroups
      summary: List SCIM groups
      description: Lists groups with SCIM 2.0 filtering and pagination per RFC 7644.
      tags:
        - SCIM
      security:
        - BearerAuth: []
      parameters:
        - name: filter
          in: query
          description: "SCIM filter expression (e.g. displayName eq \"Engineering\")"
          schema:
            type: string
        - name: startIndex
          in: query
          description: 1-based index of the first result
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: count
          in: query
          description: Maximum number of results to return
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: SCIM group list
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroupListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      operationId: createScimGroup
      summary: Create a SCIM group
      description: Creates a new group via SCIM 2.0 provisioning.
      tags:
        - SCIM
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimGroupCreate"
      responses:
        "201":
          description: SCIM group created
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroup"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /scim/v2/Groups/{scim_group_id}:
    parameters:
      - $ref: "#/components/parameters/ScimGroupIdParam"
    get:
      operationId: getScimGroup
      summary: Get a SCIM group
      description: Retrieves a single SCIM group by ID.
      tags:
        - SCIM
      security:
        - BearerAuth: []
      responses:
        "200":
          description: SCIM group details
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroup"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      operationId: replaceScimGroup
      summary: Replace a SCIM group
      description: Full replacement of a SCIM group resource.
      tags:
        - SCIM
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimGroupCreate"
      responses:
        "200":
          description: SCIM group replaced
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroup"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      operationId: patchScimGroup
      summary: Patch a SCIM group
      description: Partial update of a SCIM group via SCIM PATCH operations (RFC 7644 §3.5.2).
      tags:
        - SCIM
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimPatchRequest"
      responses:
        "200":
          description: SCIM group patched
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroup"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deleteScimGroup
      summary: Delete a SCIM group
      description: Deletes a SCIM group.
      tags:
        - SCIM
      security:
        - BearerAuth: []
      responses:
        "204":
          description: SCIM group deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # Secrets Management
  # ────────────────────────────────────────────
  /secrets:
    get:
      operationId: listSecrets
      summary: List secrets (metadata only)
      description: Returns paginated secret metadata. Secret values are never returned in list operations.
      tags:
        - Secrets
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: List of secret metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      operationId: createSecret
      summary: Create a secret
      description: Stores a new secret. The value is encrypted at rest via Vault Transit engine.
      tags:
        - Secrets
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretCreate"
      responses:
        "201":
          description: Secret created (metadata only — value not echoed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /secrets/{secret_id}:
    parameters:
      - $ref: "#/components/parameters/SecretIdParam"
    get:
      operationId: getSecret
      summary: Get secret metadata
      description: Returns secret metadata (never the secret value itself).
      tags:
        - Secrets
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Secret metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      operationId: updateSecret
      summary: Update a secret
      description: Replaces the secret value and/or metadata. Creates a new version.
      tags:
        - Secrets
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretUpdate"
      responses:
        "200":
          description: Secret updated (metadata only — value not echoed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deleteSecret
      summary: Delete a secret
      description: Permanently deletes a secret and all its versions.
      tags:
        - Secrets
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Secret deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /secrets/{secret_id}/rotate:
    parameters:
      - $ref: "#/components/parameters/SecretIdParam"
    post:
      operationId: rotateSecret
      summary: Rotate a secret
      description: |
        Triggers rotation of the secret value. Generates a new version and optionally
        notifies registered webhook callbacks.
      tags:
        - Secrets
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretRotateRequest"
      responses:
        "200":
          description: Secret rotated (metadata only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /secrets/pki/certificates:
    get:
      operationId: listPkiCertificates
      summary: List PKI certificates
      description: Returns paginated list of PKI certificates managed by the secrets engine.
      tags:
        - Secrets
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: List of PKI certificates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PkiCertificateListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      operationId: issuePkiCertificate
      summary: Issue a PKI certificate
      description: Issues a new X.509 certificate via the Vault PKI engine.
      tags:
        - Secrets
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PkiCertificateIssueRequest"
      responses:
        "201":
          description: Certificate issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PkiCertificateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /secrets/pki/certificates/{certificate_id}:
    parameters:
      - $ref: "#/components/parameters/CertificateIdParam"
    get:
      operationId: getPkiCertificate
      summary: Get a PKI certificate
      description: Retrieves a single PKI certificate by ID.
      tags:
        - Secrets
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Certificate details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PkiCertificateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /secrets/pki/certificates/{certificate_id}/revoke:
    parameters:
      - $ref: "#/components/parameters/CertificateIdParam"
    post:
      operationId: revokePkiCertificate
      summary: Revoke a PKI certificate
      description: Revokes a previously issued PKI certificate.
      tags:
        - Secrets
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PkiCertificateRevokeRequest"
      responses:
        "200":
          description: Certificate revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PkiCertificateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # MFA — TOTP
  # ────────────────────────────────────────────
  /mfa/totp/setup:
    post:
      operationId: setupTotp
      summary: Set up TOTP for the current user
      description: |
        Generates a new TOTP secret and returns a provisioning URI (otpauth://)
        and QR code data for authenticator app enrollment.
      tags:
        - MFA
      security:
        - BearerAuth: []
      responses:
        "201":
          description: TOTP setup initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpSetupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /mfa/totp/verify:
    post:
      operationId: verifyTotp
      summary: Verify a TOTP code
      description: Validates a TOTP code to complete MFA enrollment or authenticate a step-up challenge.
      tags:
        - MFA
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpVerifyRequest"
      responses:
        "200":
          description: TOTP code verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaVerifyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # MFA — WebAuthn
  # ────────────────────────────────────────────
  /mfa/webauthn/register:
    post:
      operationId: registerWebauthn
      summary: Start WebAuthn credential registration
      description: |
        Returns a PublicKeyCredentialCreationOptions challenge for the browser
        WebAuthn API to create a new credential.
      tags:
        - MFA
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebauthnRegisterRequest"
      responses:
        "200":
          description: WebAuthn registration options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebauthnRegisterResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /mfa/webauthn/register/complete:
    post:
      operationId: completeWebauthnRegistration
      summary: Complete WebAuthn credential registration
      description: |
        Receives the attestation response from the browser and stores the
        new credential for the user.
      tags:
        - MFA
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebauthnRegisterCompleteRequest"
      responses:
        "201":
          description: WebAuthn credential registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebauthnCredentialResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /mfa/webauthn/verify:
    post:
      operationId: startWebauthnVerification
      summary: Start WebAuthn authentication challenge
      description: |
        Returns a PublicKeyCredentialRequestOptions challenge for the browser
        WebAuthn API to authenticate with a registered credential.
      tags:
        - MFA
      security:
        - BearerAuth: []
      responses:
        "200":
          description: WebAuthn assertion options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebauthnVerifyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /mfa/webauthn/verify/complete:
    post:
      operationId: completeWebauthnVerification
      summary: Complete WebAuthn authentication
      description: Validates the assertion response from the browser to complete MFA verification.
      tags:
        - MFA
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebauthnVerifyCompleteRequest"
      responses:
        "200":
          description: WebAuthn verification successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaVerifyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
