# Archon Docker Compose — Minimal Dev/Test Stack
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: archon
      POSTGRES_PASSWORD: archon
      POSTGRES_DB: archon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ARCHON_DATABASE_URL: "postgresql+asyncpg://archon:archon@postgres:5432/archon"
      ARCHON_REDIS_URL: "redis://redis:6379/0"
      ARCHON_AUTH_DEV_MODE: "true"
      ARCHON_JWT_SECRET: "dev-secret-key-for-testing"
      ARCHON_JWT_ALGORITHM: "HS256"
      ARCHON_DEBUG: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
