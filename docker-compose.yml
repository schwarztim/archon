# ──────────────────────────────────────────────────────────────────────
# Archon Docker Compose — Development Stack
# ──────────────────────────────────────────────────────────────────────
# Future additions:
#   - Prometheus (prom/prometheus) — metrics collection & alerting
#   - Grafana (grafana/grafana) — dashboards & observability
#   - Jaeger (jaegertracing/all-in-one) — distributed tracing
#   - Vault HA cluster — production-grade secrets management
#   - Nginx / Traefik — reverse proxy & TLS termination
# ──────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-archon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archon}
      POSTGRES_DB: ${POSTGRES_DB:-archon}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-archon}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ARCHON_DATABASE_URL: ${ARCHON_DATABASE_URL:-postgresql+asyncpg://archon:archon@postgres:5432/archon}
      ARCHON_REDIS_URL: ${ARCHON_REDIS_URL:-redis://redis:6379/0}
      ARCHON_DEBUG: ${ARCHON_DEBUG:-true}
      ARCHON_LOG_LEVEL: ${ARCHON_LOG_LEVEL:-DEBUG}
      ARCHON_KEYCLOAK_URL: ${ARCHON_KEYCLOAK_URL:-http://keycloak:8080/auth/realms/archon}
      ARCHON_KEYCLOAK_CLIENT_ID: ${ARCHON_KEYCLOAK_CLIENT_ID:-archon-app}
      ARCHON_AUTH_DEV_MODE: ${ARCHON_AUTH_DEV_MODE:-true}
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

  vault:
    image: hashicorp/vault:1.15
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    volumes:
      - vault-data:/vault/data
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    ports:
      - "8180:8080"
    command: start-dev
    environment:
      KC_DB: dev-file
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/auth/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  vault-init:
    image: hashicorp/vault:1.15
    entrypoint: /bin/sh
    command: ["/scripts/vault-init.sh"]
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: dev-root-token
    volumes:
      - ./infra/helm/vault/vault-init.sh:/scripts/vault-init.sh:ro
    depends_on:
      vault:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP:-false}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["python3", "-m", "app.worker"]
    environment:
      ARCHON_DATABASE_URL: ${ARCHON_DATABASE_URL:-postgresql+asyncpg://archon:archon@postgres:5432/archon}
      ARCHON_REDIS_URL: ${ARCHON_REDIS_URL:-redis://redis:6379/0}
      ARCHON_LOG_LEVEL: ${ARCHON_LOG_LEVEL:-DEBUG}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-dev-root-token}
      ARCHON_WORKER_CONCURRENCY: ${ARCHON_WORKER_CONCURRENCY:-4}
      ARCHON_WORKER_SCAN_INTERVAL: ${ARCHON_WORKER_SCAN_INTERVAL:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  vault-data:
  prometheus-data:
  grafana-data:
