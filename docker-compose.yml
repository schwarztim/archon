# Archon Docker Compose — Dev/Test Stack
#
# Services: postgres, redis, vault, vault-init, keycloak, backend, worker, frontend
#
# NOTE TO MAKEFILE OWNER (W0.3): Service names this file exposes —
#   vault, vault-init, worker
# Targets `make vault-up`, `make secrets-init`, `make dev-enterprise`,
# `make worker` rely on those names. If you rename, sync this file.
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: archon
      POSTGRES_PASSWORD: archon
      POSTGRES_DB: archon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Vault (HashiCorp) — DEV mode only ─────────────────────────────
  # Production deployments must replace this with a real Vault cluster
  # (Raft / Consul backend, TLS, sealed at rest). The dev-root-token
  # below is intentionally trivial and is overridden in .env per
  # deployment.
  vault:
    image: hashicorp/vault:1.15
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: archon-dev-root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    command: ["vault", "server", "-dev", "-dev-listen-address=0.0.0.0:8200"]
    volumes:
      - vault_data:/vault/file
    healthcheck:
      # `vault status` exits 0 when initialized + unsealed (dev mode is
      # both by default). Exit 2 = sealed, exit 1 = unreachable.
      test: ["CMD-SHELL", "VAULT_ADDR=http://127.0.0.1:8200 vault status >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Vault bootstrap — runs once, exits cleanly ─────────────────────
  # Enables engines, writes policies, seeds placeholder secrets. Backend
  # waits on this completing before it tries to read secrets.
  vault-init:
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: archon-dev-root
    volumes:
      - ./infra/vault/init.sh:/vault/init.sh:ro
      - ./infra/vault/policies:/vault/policies:ro
    entrypoint: ["/bin/sh", "/vault/init.sh"]
    restart: "no"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      ARCHON_DATABASE_URL: "postgresql+asyncpg://archon:archon@postgres:5432/archon"
      ARCHON_REDIS_URL: "redis://redis:6379/0"
      ARCHON_AUTH_DEV_MODE: "true"
      ARCHON_JWT_SECRET: "dev-secret-key-for-testing"
      ARCHON_JWT_ALGORITHM: "HS256"
      ARCHON_DEBUG: "true"
      ARCHON_VAULT_ADDR: "http://vault:8200"
      ARCHON_VAULT_TOKEN_PATH: "/var/run/secrets/vault-token"
      ARCHON_VAULT_NAMESPACE: "archon"
      ARCHON_VAULT_MOUNT_POINT: "secret"
      ARCHON_VAULT_TOKEN: "archon-dev-root"
      # DEV ONLY: dev-mode root token. Production must inject a tightly
      # scoped AppRole-issued token via secrets manager.
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "archon-dev-root"
      LLM_STUB_MODE: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Worker — separate process from backend ─────────────────────────
  # Consumes scheduled jobs (scans, secret rotation checks, budget
  # alerts, workflow run draining). Same code base as backend, distinct
  # entrypoint (`python -m app.worker`).
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      ARCHON_DATABASE_URL: "postgresql+asyncpg://archon:archon@postgres:5432/archon"
      ARCHON_REDIS_URL: "redis://redis:6379/0"
      ARCHON_AUTH_DEV_MODE: "true"
      ARCHON_JWT_SECRET: "dev-secret-key-for-testing"
      ARCHON_DEBUG: "true"
      ARCHON_VAULT_ADDR: "http://vault:8200"
      ARCHON_VAULT_NAMESPACE: "archon"
      ARCHON_VAULT_MOUNT_POINT: "secret"
      ARCHON_VAULT_TOKEN: "archon-dev-root"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "archon-dev-root"
      LLM_STUB_MODE: "true"
      ARCHON_WORKER_CONCURRENCY: "4"
      ARCHON_WORKER_SCAN_INTERVAL: "300"
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    ports:
      - "8180:8080"
    command: start-dev
    environment:
      KC_DB: dev-file
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 1 cat <&3 | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  vault_data:
