name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend
        run: ruff check backend/
      - name: Lint gateway
        run: ruff check gateway/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run tests
        run: cd $GITHUB_WORKSPACE && PYTHONPATH=backend python3 -m pytest tests/ --no-header -q

  test-gateway:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install gateway dependencies
        run: pip install -r gateway/requirements.txt
      - name: Run gateway tests
        run: |
          if [ -d "tests/gateway" ]; then
            PYTHONPATH=gateway python3 -m pytest tests/gateway/ --no-header -q
          else
            echo "No gateway tests found — skipping"
          fi

  build:
    runs-on: ubuntu-latest
    needs: [test, test-gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        run: docker build -t archon-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t archon-frontend:ci ./frontend
      - name: Build gateway image
        run: docker build -t archon-gateway:ci ./gateway

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install safety
        run: pip install safety
      - name: Scan backend dependencies
        run: safety check -r backend/requirements.txt --output text || true
      - name: Scan gateway dependencies
        run: safety check -r gateway/requirements.txt --output text || true
